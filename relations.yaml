relations:
  - collection: accounts
    fields:
      - field: userId
        references_collection: users
        references_field: _id
      - field: systemId
        references_collection: systems
        references_field: _id
        optional: true
  - collection: board
    fields:
      - field: courseId
        references_collection: courses
        references_field: _id
      - field: referenceIds
        references_collection: board-element
        references_field: _id
  - collection: board-element
    fields:
      - field: target
        discriminator: boardElementType
        cases:
          - value: lesson
            references_collection: lessons
          - value: task
            references_collection: homeworks
          - value: columnboard
            references_collection: boardnodes

# unknown gets too big as some are root elemnts some are not
