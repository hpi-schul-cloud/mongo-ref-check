relations:
  - collection: "schools"
    fields:
      - field: "systems"
        references_collection: "systems"
        references_field: "_id"
        is_array: true
      - field: "federalState"
        references_collection: "federalstates"
        references_field: "_id"
      - field: "currentYear"
        references_collection: "years"
        references_field: "_id"
        optional: true
      - field: "storageProvider"
        references_collection: "storageproviders"
        references_field: "_id"
        optional: true

  - collection: "systems"
    fields:
      - field: "_id"
        references_collection: "schools"
        references_field: "systems"
        is_array: true

  - collection: "accounts"
    fields:
      - field: "userId"
        references_collection: "users"
        references_field: "_id"
      - field: "systemId"
        references_collection: "systems"
        references_field: "_id"
        optional: true

  - collection: "users"
    fields:
      - field: "schoolId"
        references_collection: "schools"
        references_field: "_id"
      - field: "roles"
        references_collection: "roles"
        references_field: "_id"
        is_array: true
      - field: "_id"
        references_collection: "accounts"
        references_field: "userId"

  - collection: "classes"
    fields:
      - field: "schoolId"
        references_collection: "schools"
        references_field: "_id"
      - field: "teacherIds"
        references_collection: "users"
        references_field: "_id"
      - field: "userIds"
        references_collection: "users"
        references_field: "_id"
      - field: "year"
        references_collection: "years"
        references_field: "_id"
        optional: true

  - collection: "coursegroups"
    fields:
      - field: "schoolId"
        references_collection: "schools"
        references_field: "_id"
      - field: "courseId"
        references_collection: "courses"
        references_field: "_id"
      - field: "userIds"
        references_collection: "users"
        references_field: "_id"

  - collection: "courses"
    fields:
      - field: "schoolId"
        references_collection: "schools"
        references_field: "_id"
      - field: "substitutionIds"
        references_collection: "users"
        references_field: "_id"
        is_array: true
      - field: "teacherIds"
        references_collection: "users"
        references_field: "_id"
        is_array: true
      - field: "userIds"
        references_collection: "users"
        references_field: "_id"
        is_array: true
      - field: "classIds"
        references_collection: "classes"
        references_field: "_id"
        is_array: true

  - collection: "dashboard"
    fields:
      - field: "userId"
        references_collection: "users"
        references_field: "_id"

  - collection: "dashboardelement"
    fields:
      - field: "dashboard"
        references_collection: "dashboard"
        references_field: "_id"
      - field: "referenceIds"
        references_collection: "courses"
        references_field: "_id"
        is_array: true

  - collection: "rocketchatusers"
    fields:
      - field: "userId"
        references_collection: "users"
        references_field: "_id"

  - collection: "rocketchatchannels"
    fields:
      - field: "teamId"
        references_collection: "teams"
        references_field: "_id"

  - collection: "board"
    fields:
      - field: "courseId"
        references_collection: "courses"
        references_field: "_id"
      - field: "referenceIds"
        references_collection: "board-element"
        references_field: "_id"

  - collection: "board-element"
    fields:
      - field: "target"
        discriminator: "boardElementType"
        cases:
          - value: "lesson"
            references_collection: "lessons"
          - value: "task"
            references_collection: "homeworks"
          - value: "columnboard"
            references_collection: "boardnodes"

