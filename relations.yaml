        references_field: "_id"
      - field: "tool"
        references_collection: "external-tools"
        references_field: "_id"


  - collection: "sharetokens"
    fields:
      - field: "parent"
        discriminator: "parentType"
        cases:
          - value: "columnBoard"
            references_collection: "boardnodes"
          - value: "courses"
            references_collection: "courses"
          - value: "lessons"
            references_collection: "lessons"
          - value: "tasks"
            references_collection: "homeworks"
      - field: "context"
        references_collection: "schools"
        references_field: "_id"
