  - collection: classes
    fields:
      - field: schoolId
        references_collection: schools
        references_field: _id
      - field: teacherIds
        references_collection: users
        references_field: _id
      - field: userIds
        references_collection: users
        references_field: _id
      - field: year
        references_collection: years
        references_field: _id
        optional: true

  - collection: consentversions
    fields:
      - field: schoolId
        references_collection: schools
        references_field: _id
      - field: consentDataId
        references_collection: base64files
        references_field: _id

  - collection: context-external-tools
    fields:
      - field: schoolTool
        references_collection: school-external-tools
        references_field: _id
      - field: contextId
        discriminator: contextType
        cases:
          - value: course
            references_collection: courses
          - value: boardElement
            references_collection: boardnodes
          - value: mediaBoard
            references_collection: boardnodes


  - collection: coursegroups
    fields:
      - field: schoolId
        references_collection: schools
        references_field: _id
      - field: courseId
        references_collection: courses
        references_field: _id
      - field: userIds
        references_collection: users
        references_field: _id
  - collection: courses
    fields:
      - field: schoolId
        references_collection: schools
        references_field: _id
      - field: substitutionIds
        references_collection: users
        references_field: _id
        is_array: true
      - field: teacherIds
        references_collection: users
        references_field: _id
        is_array: true
      - field: userIds
        references_collection: users
        references_field: _id
        is_array: true
      - field: classIds
        references_collection: classes
        references_field: _id
        is_array: true
  - collection: dashboard
    fields:
      - field: userId
        references_collection: users
        references_field: _id
  - collection: dashboardelement
    fields:
      - field: dashboard
        references_collection: dashboard
        references_field: _id
      - field: referenceIds
        references_collection: courses
        references_field: _id
        is_array: true
  - collection: external-tool-pseudonyms
    fields:
      - field: userId
        references_collection: users
        references_field: _id
      - field: toolId
        references_collection: external-tools
        references_field: _id

  - collection: "filerecords"
    fields:
      - field: "parent"
        discriminator: "parentType"
        cases:
          - value: "boardnodes"
            references_collection: "boardnodes"
          - value: "gradings"
            references_collection: "submissions"
          - value: "lessons"
            references_collection: "lessons"
          - value: "submissions"
            references_collection: "submissions"
          - value: "tasks"
            references_collection: "homeworks"


  - collection: files
    fields:
      - field: creator
        references_collection: users
        references_field: _id
      - field: "owner"
        discriminator: "refOwnerModel"
        cases:
          - value: "course"
            references_collection: "courses"
          - value: "teams"
            references_collection: "teams"
          - value: "user"
            references_collection: "users"


  - collection: groups
    fields:
      - field: organization
        references_collection: schools
        references_field: _id
#      - field: users  {users, role}

  - collection: h5p-editor-content
    fields:
      - field: school
        references_collection: schools
        references_field: _id
      - field: "parent"
        discriminator: "parentType"
        cases:
          - value: "board-element"
            references_collection: "boardnodes"
      - field: creator
        references_collection: users
        references_field: _id


  - collection: homeworks
    fields:
      - field: schoolId
        references_collection: schools
        references_field: _id
      - field: teacherId
        references_collection: users
        references_field: _id
      - field: courseId
        references_collection: courses
        references_field: _id
      - field: lessonId
        references_collection: lessons
        references_field: _id
        optional: true
  - collection: importusers
    fields:
      - field: schoolId
        references_collection: schools
        references_field: _id
      - field: system
        references_collection: systems
        references_field: _id
  - collection: lessons
    fields:
      - field: courseId
        references_collection: courses
        references_field: _id
      - field: materialIds
        references_collection: materials
        references_field: _id
        is_array: true
      - field: _id
        references_collection: homeworks
        references_field: lessonId

  - collection: lti-deep-link-token
    fields:
      - field: user
        references_collection: users
        references_field: _id


  - collection: news
    fields:
      - field: schoolId
        references_collection: schools
        references_field: _id
      - field: target
        discriminator: targetModel
        cases:
          - value: schools
            references_collection: schools
          - value: teams
            references_collection: teams

  - collection: oauth-session-token
    fields:
      - field: user
        references_collection: users
        references_field: _id
      - field: system
        references_collection: systems
        references_field: _id

  - collection: passwordrecoveries
    fields:
      - field: account
        references_collection: accounts
        references_field: _id

  - collection: registrationpins
    fields:
      - field: email
        references_collection: users
        references_field: email
      - field: email
        references_collection: accounts
        references_field: username

# check with north star
  - collection: registrations
    fields:
      - field: email
        references_collection: users
        references_field: email
      - field: email
        references_collection: accounts
        references_field: username
      - field: roomIds
        references_collection: rooms
        references_field: _id

  - collection: roles
    fields:
      - field: roles
        references_collection: roles
        references_field: _id
        is_array: true

# stupid fields are strings not objectids argh!
  - collection: room-invitation-links
    fields:
      - field: creatorUserId
        references_collection: users
        references_field: _id
        is_stupid_string: true
      - field: creatorSchoolId
        references_collection: schools
        references_field: _id
        is_stupid_string: true
      - field: roomId
        references_collection: rooms
        references_field: _id
        is_stupid_string: true


  - collection: room-memberships
    fields:
      - field: room
        references_collection: rooms
        references_field: _id
      - field: userGroup
        references_collection: groups
        references_field: _id
      - field: school
        references_collection: schools
        references_field: _id


  - collection: roomarrangements
    fields:
      - field: user
        references_collection: users
        references_field: _id
      - field: items
        references_collection: rooms
        references_field: _id
        is_array: true

  - collection: roomcontents
    fields:
      - field: room
        references_collection: rooms
        references_field: _id
      #- field: items
#    items: [
#      { id: '695bf005c9372e89b2142e25', type: 'board' },
#      { id: '695bf04f64bb2aa70b2e4f7d', type: 'board' }
#    ]
  - collection: rooms
    fields:
      - field: school
        references_collection: schools
        references_field: _id

  - collection: school-external-tools
    fields:
      - field: school
        references_collection: schools
        references_field: _id
      - field: tool
        references_collection: external-tools
        references_field: _id

  - collection: school-licenses
    fields:
      - field: school
        references_collection: schools
        references_field: _id
      - field: mediaSource
        references_collection: media-sources
        references_field: _id

  - collection: school-system-options
    fields:
      - field: school
        references_collection: schools
        references_field: _id
      - field: system
        references_collection: systems
        references_field: _id
  - collection: schools
    fields:
      - field: systems
        references_collection: systems
        references_field: _id
        is_array: true
      - field: federalState
        references_collection: federalstates
        references_field: _id
      - field: currentYear
        references_collection: years
        references_field: _id
        optional: true
      - field: storageProvider
        references_collection: storageproviders
        references_field: _id
        optional: true
  - collection: sharetokens
    fields:
      - field: parent
        discriminator: parentType
        cases:
          - value: columnBoard
            references_collection: boardnodes
          - value: courses
            references_collection: courses
          - value: lessons
            references_collection: lessons
          - value: tasks
            references_collection: homeworks
          - value: room
            references_collection: room
          - value: card
            references_collection: card
      - field: context
        references_collection: schools
        references_field: _id
        optional: true
  - collection: storageproviders
    fields:
      - field: _id
        references_collection: schools
        references_field: storageProvider
  - collection: submissions
    fields:
      - field: schoolId
        references_collection: schools
        references_field: _id
      - field: studentId
        references_collection: users
        references_field: _id
      - field: homeworkId
        references_collection: homeworks
        references_field: _id
  - collection: systems
    fields:
      - field: _id
        references_collection: schools
        references_field: systems
        is_array: true
  - collection: teams
    fields:
      - field: schoolId
        references_collection: schools
        references_field: _id
      - field: schoolIds
        references_collection: schools
        references_field: _id
        is_array: true

  - collection: user-licenses
    fields:
      - field: mediaSource
        references_collection: media-sources
        references_field: _id

  - collection: user-login-migrations
    fields:
      - field: school
        references_collection: schools
        references_field: _id

  - collection: users
    fields:
      - field: schoolId
        references_collection: schools
        references_field: _id
      - field: roles
        references_collection: roles
        references_field: _id
        is_array: true
      - field: _id
        references_collection: accounts
        references_field: userId


